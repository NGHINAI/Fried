name: Fried
options:
  bundleIdPrefix: com.fried
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Fried:
    type: application
    platform: iOS
    sources:
      - path: Sources/Fried
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nghinai.fried
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: Fried

  FriedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FriedTests
    dependencies:
      - target: Fried
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nghinai.fried.tests

schemes:
  Fried:
    build:
      targets:
        Fried: all
    run:
      config: Debug
      storeKitConfiguration: Fried.storekit
    test:
      config: Debug
      targets:
        - FriedTests
    archive:
      config: Release
